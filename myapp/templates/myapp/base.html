<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CalTrack — Daily Calorie Counter{% endblock %}</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Syne"', 'sans-serif'],
            body: ['"DM Sans"', 'sans-serif'],
            mono: ['"DM Mono"', 'monospace'],
          },
          colors: {
            lime: {
              400: '#a3e635',
              500: '#84cc16',
            },
            zinc: {
              900: '#18181b',
              800: '#27272a',
              700: '#3f3f46',
              600: '#52525b',
              400: '#a1a1aa',
              300: '#d4d4d8',
              100: '#f4f4f5',
            },
          },
        },
      },
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Syne', sans-serif; }
    .font-mono-custom { font-family: 'DM Mono', monospace; }

    /* Animated gradient orb background */
    .bg-orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      opacity: 0.12; pointer-events: none; z-index: 0;
    }

    /* Progress bar animation */
    .progress-fill { transition: width 0.8s cubic-bezier(.4,0,.2,1); }

    /* Row hover */
    .food-row { transition: background 0.15s; }
    .food-row:hover { background: rgba(163,230,53,0.06); }

    /* Delete button pulse on hover */
    .btn-delete:hover { color: #f87171; }

    /* Input focus glow */
    .input-glow:focus {
      outline: none;
      box-shadow: 0 0 0 2px #a3e635;
    }

    /* Fade-in for rows */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .food-row { animation: fadeSlideIn 0.3s ease forwards; }

    /* Toast messages */
    .toast { animation: fadeSlideIn 0.4s ease; }
  </style>
</head>

<body class="bg-zinc-900 text-zinc-100 min-h-screen relative overflow-x-hidden">

  <!-- Background decorative orbs -->
  <div class="bg-orb w-96 h-96 bg-lime-400 top-[-80px] left-[-80px]"></div>
  <div class="bg-orb w-72 h-72 bg-emerald-400 bottom-[-60px] right-[-60px]"></div>

  <!-- Nav -->
  <header class="relative z-10 border-b border-zinc-800 px-6 py-4">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <a href="{% url 'index' %}" class="flex items-center gap-2">
        <span class="font-display text-xl font-bold tracking-tight">
          Cal<span class="text-lime-400">Track</span>
        </span>
        <span class="text-xs font-mono-custom text-zinc-500 border border-zinc-700 rounded px-1.5 py-0.5">beta</span>
      </a>
      <span class="text-xs text-zinc-500 font-mono-custom">
        {% now "l, N j" %}
      </span>
    </div>
  </header>

  <!-- Toast messages -->
  {% if messages %}
  <div class="relative z-20 max-w-2xl mx-auto px-6 pt-4 space-y-2">
    {% for message in messages %}
    <div class="toast flex items-center gap-3 rounded-lg px-4 py-3 text-sm
      {% if message.tags == 'success' %}bg-lime-400/10 border border-lime-400/30 text-lime-300
      {% elif message.tags == 'error' %}bg-red-500/10 border border-red-500/30 text-red-300
      {% else %}bg-zinc-800 border border-zinc-700 text-zinc-300{% endif %}">
      {% if message.tags == 'success' %}
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      {% else %}
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {% endif %}
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Main content -->
  <main class="relative z-10 max-w-2xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="relative z-10 text-center text-xs text-zinc-600 pb-8 font-mono-custom">
    CalTrack &mdash; built with Django &amp; Tailwind CSS
  </footer>

</body>
</html>
